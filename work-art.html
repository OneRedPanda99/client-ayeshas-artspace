<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art — Ayesha's Artspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Description modal */
    .description-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .description-modal.open {
      display: flex;
    }

    .description-content {
      background: var(--bg-tile);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
      animation: fadeUp 0.3s ease;
    }

    .description-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.5rem;
    }

    .description-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text);
      margin: 0;
    }

    .description-close {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 1.5rem;
      cursor: pointer;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .description-close:hover {
      color: var(--orange);
    }

    .description-text {
      color: var(--text-dim);
      line-height: 1.6;
      margin-bottom: 1rem;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .description-meta {
      display: flex;
      gap: 1rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Add hover effect to cards to indicate they're clickable */
    .work-card.has-description {
      cursor: pointer;
    }

    .work-card.has-description:hover {
      border: 1px solid rgba(242, 89, 18, 0.3);
    }
  </style>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <nav id="nav">
    <a href="index.html" class="nav-logo">Ayesha's Artspace</a>
    <div class="nav-links" id="navLinks">
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
    <button class="nav-toggle" id="navToggle" aria-label="Open menu">
      <span></span>
      <span></span>
    </button>
  </nav>

  <div class="page-header">
    <div class="breadcrumb">
      <a href="index.html">Work</a>
      <span>/</span>
      <span>Art</span>
    </div>
    <span class="page-label">Discipline 03</span>
    <h1 class="page-title">Art</h1>
  </div>

  <!-- Description Modal -->
  <div class="description-modal" id="descriptionModal">
    <div class="description-content">
      <div class="description-header">
        <h2 class="description-title" id="modalTitle">Project Title</h2>
        <button class="description-close" id="closeModal" aria-label="Close description">&times;</button>
      </div>
      <p class="description-text" id="modalDescription">Add description for this artwork.</p>
      <div class="description-meta">
        <div class="meta-item">
          <span>Year:</span>
          <span id="modalYear">2025</span>
        </div>
        <div class="meta-item">
          <span>Size:</span>
          <span id="modalSize">—</span>
        </div>
      </div>
    </div>
  </div>

  <div class="work-grid">

    <div class="work-card has-description">
      <div class="work-card-img"><img src="images/logokeartgreenblacktree.jpg" alt="Green and black tree art"></div>
      <div class="work-card-info">
        <div class="work-card-title">Project Title</div>
        <div class="work-card-meta">2025</div>
      </div>
      <div class="card-data" style="display: none;" data-description="" data-size="—"></div>
    </div>

    <div class="work-card has-description">
      <div class="work-card-img"><img src="images/logokeartbluenightsky.jpg" alt="Blue night sky art"></div>
      <div class="work-card-info">
        <div class="work-card-title">Project Title</div>
        <div class="work-card-meta">2025</div>
      </div>
      <div class="card-data" style="display: none;" data-description="" data-size="—"></div>
    </div>

    <div class="work-card has-description">
      <div class="work-card-img"><img src="images/logokeartredandblacktree.jpg" alt="Red and black tree art"></div>
      <div class="work-card-info">
        <div class="work-card-title">Project Title</div>
        <div class="work-card-meta">2025</div>
      </div>
      <div class="card-data" style="display: none;" data-description="" data-size="—"></div>
    </div>

    <!-- Placeholder cards for new images -->
    <div class="work-card">
      <div class="work-card-img"><div class="placeholder-dot"></div></div>
      <div class="work-card-info">
        <div class="work-card-title">Project Title</div>
        <div class="work-card-meta">2024</div>
      </div>
    </div>

    <div class="work-card">
      <div class="work-card-img"><div class="placeholder-dot"></div></div>
      <div class="work-card-info">
        <div class="work-card-title">Project Title</div>
        <div class="work-card-meta">2024</div>
      </div>
    </div>

    <div class="work-card">
      <div class="work-card-img"><div class="placeholder-dot"></div></div>
      <div class="work-card-info">
        <div class="work-card-title">Project Title</div>
        <div class="work-card-meta">2024</div>
      </div>
    </div>

  </div>

  <footer>
    <a href="index.html" class="footer-logo">Ayesha's Artspace</a>
    <span class="footer-copy">© 2025</span>
  </footer>

  <script>
    // ═══════════════════════════════════════════════
    // UI Sound Effects (Subtle Clicks)
    // ═══════════════════════════════════════════════
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();

    function playClickSound() {
      const now = audioContext.currentTime;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();

      osc.connect(gain);
      gain.connect(audioContext.destination);

      // Soft, satisfying click parameters
      osc.frequency.setValueAtTime(1800, now);
      osc.frequency.exponentialRampToValueAtTime(600, now + 0.12);

      gain.gain.setValueAtTime(0.06, now);
      gain.gain.exponentialRampToValueAtTime(0.002, now + 0.12);

      osc.start(now);
      osc.stop(now + 0.12);
    }

    // ═══════════════════════════════════════════════
    // Description Modal Logic
    // ═══════════════════════════════════════════════
    const modal = document.getElementById('descriptionModal');
    const closeBtn = document.getElementById('closeModal');
    const cards = document.querySelectorAll('.work-card.has-description');

    // Open modal on card click
    cards.forEach((card, index) => {
      card.addEventListener('click', () => {
        playClickSound();
        const year = card.querySelector('.work-card-meta').textContent;
        const title = card.querySelector('.work-card-title').textContent;
        const cardData = card.querySelector('.card-data');
        const description = cardData.dataset.description;
        const size = cardData.dataset.size;

        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalDescription').textContent = description;
        document.getElementById('modalYear').textContent = year;
        document.getElementById('modalSize').textContent = size;

        modal.classList.add('open');
      });
    });

    // Close modal
    closeBtn.addEventListener('click', () => {
      playClickSound();
      modal.classList.remove('open');
    });

    // Close modal on background click
    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        playClickSound();
        modal.classList.remove('open');
      }
    });

    // Close modal on Escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modal.classList.contains('open')) {
        playClickSound();
        modal.classList.remove('open');
      }
    });

    // ═══════════════════════════════════════════════
    // Staggered Card Reveal on Scroll
    // ═══════════════════════════════════════════════
    const allCards = document.querySelectorAll('.work-card');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.05, rootMargin: '0px 0px -30px 0px' });

    allCards.forEach((card, i) => {
      card.style.transitionDelay = `${i * 65}ms`;
      observer.observe(card);
    });

    // ═══════════════════════════════════════════════
    // Navigation & Mobile Menu
    // ═══════════════════════════════════════════════
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 40);
    }, { passive: true });

    const toggle = document.getElementById('navToggle');
    const links = document.getElementById('navLinks');
    toggle.addEventListener('click', () => {
      playClickSound();
      const open = links.classList.toggle('open');
      toggle.classList.toggle('open', open);
      toggle.setAttribute('aria-label', open ? 'Close menu' : 'Open menu');
    });
  </script>
</body>
</html>
