<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Ayesha's Artspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <nav id="nav">
    <a href="index.html" class="nav-logo">Ayesha's Artspace</a>
    <div class="nav-links" id="navLinks">
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
    <button class="nav-toggle" id="navToggle" aria-label="Open menu">
      <span></span>
      <span></span>
    </button>
  </nav>

  <div class="page-header">
    <span class="page-label">Contact</span>
    <h1 class="page-title">Let's talk.</h1>
  </div>

  <div class="contact-body">
    <div class="contact-left">
      <p class="contact-tagline">I'm open to custom projects, collaborations, and creative opportunities. Feel free to reach out with any inquiries.</p>
      <a href="mailto:ayesha@example.com" class="contact-email-link">ayesha@example.com</a>
    </div>

    <div class="contact-right">
      <p class="socials-label">Elsewhere</p>
      <ul class="social-list">
        <li class="social-item">
          <a href="https://www.instagram.com/ayeshasartspace" target="_blank" rel="noopener noreferrer">
            Instagram
            <span class="s-arrow">↗</span>
          </a>
        </li>
        <li class="social-item">
          <a href="https://www.behance.net/ayeshas12" target="_blank" rel="noopener noreferrer">
            Behance
            <span class="s-arrow">↗</span>
          </a>
        </li>
      </ul>
    </div>
  </div>

  <footer>
    <a href="index.html" class="footer-logo">Ayesha's Artspace</a>
    <span class="footer-copy">© 2025</span>
  </footer>

  <script>
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 40);
    }, { passive: true });

    const toggle = document.getElementById('navToggle');
    const links  = document.getElementById('navLinks');
    toggle.addEventListener('click', () => {
      const open = links.classList.toggle('open');
      toggle.classList.toggle('open', open);
      toggle.setAttribute('aria-label', open ? 'Close menu' : 'Open menu');
    });
  </script>
</body>
</html>
